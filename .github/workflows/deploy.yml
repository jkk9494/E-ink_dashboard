name: Deploy Dashboard with DB Data

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # 매 시간 정각에 자동 업데이트

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary

      - name: Fetch Data from PostgreSQL
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          python <<EOF
          import psycopg2
          import os

          # DB 연결
          conn = psycopg2.connect(
              host=os.getenv('DB_HOST'),
              database=os.getenv('DB_NAME'),
              user=os.getenv('DB_USER'),
              password=os.getenv('DB_PASS'),
              port=os.getenv('DB_PORT')
          )
          cur = conn.cursor()

          # 예시: 가장 최근 읽은 책 정보 가져오기 (형의 테이블 구조에 맞게 쿼리 수정 필요)
          cur.execute("SELECT title, progress FROM books ORDER BY updated_at DESC LIMIT 1")
          row = cur.fetchone()
          book_title = row[0] if row else "데이터 없음"
          book_progress = f"{row[1]}%" if row else "0%"

          # index.html 파일 읽어서 자리표시자(Placeholder) 치환
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # HTML 내의 특정 텍스트를 DB 데이터로 교체
          html = html.replace('{{DB_BOOK_TITLE}}', book_title)
          html = html.replace('{{DB_BOOK_PROGRESS}}', book_progress)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          cur.close()
          conn.close()
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
