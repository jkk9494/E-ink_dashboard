name: Dashboard Sync

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각 실행
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행
  workflow_dispatch: # 수동으로 실행 버튼 누르고 싶을 때 대비

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install psycopg2-binary
        
      - name: Run Dashboard Update
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python update_dashboard.py

      # 파일이 잘 바뀌었는지 로그로 확인 (디버깅용)
      - name: Check if file changed
        run: grep "completedDates =" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./  # 현재 경로(수정된 index.html이 있는 곳)를 배포
          force_orphan: true # 이전 배포 기록을 무시하고 현재 상태를 강제로 올림
