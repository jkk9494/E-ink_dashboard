<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium E-ink Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --bg: #ffffff; --fg: #000000; --border: 2.2px; --radius: 28px; }
        body { background-color: var(--bg); color: var(--fg); font-family: 'Pretendard', sans-serif; margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 500px; text-align: left; }
        .header .date-full { font-size: 2.2rem; font-weight: 900; line-height: 1.2; letter-spacing: -1.5px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 500px; }
        .widget { border: var(--border) solid var(--fg); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; background: white; box-sizing: border-box; }
        .small { aspect-ratio: 1.1 / 1; justify-content: space-between; }
        .large-sq { grid-column: span 2; aspect-ratio: 1.2 / 1; justify-content: flex-start; }
        .medium { grid-column: span 2; min-height: 120px; justify-content: space-between; }
        .label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .value { font-size: 1.8rem; font-weight: 900; line-height: 1; margin: 4px 0; }
        .sub { font-size: 0.85rem; font-weight: 700; margin-top: 4px; }
        .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .routine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        /* 터치하기 좋게 cursor 추가, 하이라이트 제거 */
        .todo-item { border: 2px solid var(--fg); border-radius: 14px; padding: 8px 10px; font-size: 0.9rem; font-weight: 800; display: flex; align-items: center; gap: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .todo-item.done { background-color: var(--fg); color: var(--bg); }
        .todo-item.done .icon { stroke: var(--bg); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; }
        .cal-date { font-size: 0.95rem; font-weight: 800; height: 38px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .today { background: var(--fg); color: var(--bg); border-radius: 10px; }
        .dot { font-size: 1.2rem; line-height: 0; margin-top: -2px; }
        #quote-text { font-size: 0.9rem; font-weight: 800; line-height: 1.4; word-break: keep-all; }
    </style>
</head>
<body>
    <div class="header"><h1 class="date-full" id="date-full">로딩 중...</h1></div>
    <div class="container">
        <div class="widget small">
            <div class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/><circle cx="12" cy="12" r="4"/></svg>Weather</div>
            <div class="value" id="weather-temp">--°</div>
            <div class="sub" id="weather-desc">호출 중</div>
        </div>
        <div class="widget small">
            <div class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Exam</div>
            <div class="value">{{D_DAY_VAL}}</div>
            <div class="sub">{{D_DAY_TITLE}}</div>
        </div>
        <div class="widget small">
            <div class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"/></circle></svg>Birthday</div>
            <div class="value">{{BDAY_VAL}}</div>
            <div class="sub">🎂 {{BDAY_TITLE}}</div>
        </div>
        <div class="widget small">
            <div class="label"><svg class="icon" viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>Quote</div>
            <div id="quote-text">로딩 중...</div>
        </div>
        <div class="widget medium">
            <div class="label">Morning Routine</div>
            <div class="routine-grid" id="routine-list">{{ROUTINE_LIST}}</div>
        </div>
        <div class="widget large-sq">
            <div class="label">Calendar</div>
            <div class="cal-grid" id="calendar"></div>
        </div>
    </div>
    <script>
        const now = new Date();
        document.getElementById('date-full').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${now.toLocaleDateString('ko-KR',{weekday:'long'})}`;
        
        const quotes = ["오늘 할 수 있는 일에 전력을 다하라.", "성공은 매일 반복되는 작은 노력들의 합이다.", "기회는 준비된 자에게만 찾아온다."];
        document.getElementById('quote-text').innerText = quotes[Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000) % quotes.length];
        
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current_weather=true&timezone=Asia%2FSeoul');
                const data = await res.json();
                document.getElementById('weather-temp').innerText = `${Math.round(data.current_weather.temperature)}°`;
                document.getElementById('weather-desc').innerText = `서울 · 날씨코드 ${data.current_weather.weathercode}`;
            } catch (e) { document.getElementById('weather-temp').innerText = "Err"; }
        }
        fetchWeather();
        
        // 캘린더 생성
        const completedDates = {{COMPLETED_DATES}}; 
        const calContainer = document.getElementById('calendar');
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const lastDate = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        ['S','M','T','W','T','F','S'].forEach(d => { const el = document.createElement('div'); el.innerText = d; el.style.opacity="0.4"; calContainer.appendChild(el); });
        for(let i=0; i<firstDay; i++) calContainer.appendChild(document.createElement('div'));
        for(let i=1; i<=lastDate; i++) {
            const el = document.createElement('div'); el.className = 'cal-date';
            const fullDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            el.innerHTML = `<span>${i}</span>`;
            if(i === now.getDate()) el.classList.add('today');
            if(completedDates.includes(fullDate)) el.innerHTML += `<span class="dot">.</span>`;
            calContainer.appendChild(el);
        }

        // --- 여기서부터 새로 추가된 모닝루틴 터치 이벤트 로직 --- //
        const currentYear = now.getFullYear();
        const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
        const currentDate = String(now.getDate()).padStart(2, '0');
        const fullDateStr = `${currentYear}-${currentMonth}-${currentDate}`; // YYYY-MM-DD 포맷

        // 1초 뒤에 실행되도록 지연 (파이썬이 HTML을 다 렌더링한 후 이벤트를 붙이기 위함)
        setTimeout(() => {
            document.querySelectorAll('.todo-item').forEach(item => {
                item.addEventListener('click', () => {
                    // 1. 화면 색상 바로 뒤집기 (반응성)
                    const isDone = item.classList.toggle('done');
                    const routineId = item.getAttribute('data-id');

                    // 2. Vercel 서버로 전송
                    // 🚨 중요: 아래 URL을 형이 Vercel에서 발급받은 진짜 주소로 무조건 바꿔야 해! 🚨
                    const VERCEL_API_URL = 'https://e-ink-dashboard.vercel.app/api/routine/api/routine';

                    fetch(VERCEL_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            routine_id: parseInt(routineId),
                            date: fullDateStr,
                            is_completed: isDone
                        })
                    })
                    .then(res => res.json())
                    .then(data => console.log('DB 전송 완료:', data))
                    .catch(err => console.error('전송 실패:', err));
                });
            });
        }, 500);

        // 30분마다 자동 새로고침
        setTimeout(() => location.reload(), 1800000);
    </script>
</body>
</html>
