<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mac-style Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-width: 2.5px;
            --radius: 28px;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; }
        
        .widget { border: var(--border-width) solid var(--text-color); border-radius: var(--radius); padding: 18px; display: flex; flex-direction: column; justify-content: space-between; background: white; box-sizing: border-box; }
        .small { aspect-ratio: 1 / 1; }
        .medium { grid-column: span 2; min-height: 110px; }

        .label { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .value { font-size: 2.2rem; font-weight: 900; margin: 0; line-height: 1.1; }
        .sub-text { font-size: 0.9rem; font-weight: 600; margin-top: 5px; }

        /* 할 일 목록 (Morning Routine) */
        .todo-list { list-style: none; padding: 0; margin: 10px 0 0 0; }
        .todo-item { font-size: 1.1rem; margin-bottom: 6px; font-weight: 700; display: flex; align-items: center; }
        .todo-item::before { content: ""; display: inline-block; width: 14px; height: 14px; border: 1.5px solid black; border-radius: 4px; margin-right: 10px; }

        /* 달력 위젯 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 0.75rem; margin-top: 10px; font-weight: 700; }
        .today { background-color: black; color: white; border-radius: 4px; }
        .special-day { text-decoration: underline; font-weight: 900; } /* 생일 등 표시 */
    </style>
</head>
<body>

    <div class="container">
        <div class="widget small">
            <div>
                <div class="label">Exam D-Day</div>
                <div class="value" id="exam-dday">D-?</div>
            </div>
            <div class="sub-text">정보기처리기사</div>
        </div>

        <div class="widget small">
            <div>
                <div class="label">Birthday</div>
                <div class="value" style="font-size: 1.8rem;">04.29</div>
            </div>
            <div class="sub-text">🎉 뚜기 생일</div>
        </div>

        <div class="widget medium">
            <div class="label">Morning Routine</div>
            <div class="todo-list">
                <div class="todo-item">글씨연습</div>
                <div class="todo-item">영어공부</div>
                <div class="todo-item">시험공부</div>
                <div class="todo-item">커피내리기</div>
            </div>
        </div>

        <div class="widget medium">
            <div class="label" id="month-label">Month</div>
            <div class="calendar-grid" id="calendar"></div>
        </div>
    </div>

    <script>
        const now = new Date();
        
        // 1. 정처기 시험 D-Day 계산 (4월 18일)
        const examDate = new Date(now.getFullYear(), 3, 18); // 월은 0부터 시작하므로 3이 4월
        const diff = examDate - now;
        const dDay = Math.ceil(diff / (1000 * 60 * 60 * 24));
        document.getElementById('exam-dday').innerText = dDay > 0 ? `D-${dDay}` : (dDay === 0 ? "D-Day" : `D+${Math.abs(dDay)}`);

        // 2. 달력 생성
        document.getElementById('month-label').innerText = now.toLocaleString('en-US', { month: 'long', year: 'numeric' });
        const daysContainer = document.getElementById('calendar');
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const lastDate = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        
        const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        dayNames.forEach(d => {
            const el = document.createElement('div'); el.innerText = d;
            daysContainer.appendChild(el);
        });

        for (let i = 0; i < firstDay; i++) daysContainer.appendChild(document.createElement('div'));

        for (let i = 1; i <= lastDate; i++) {
            const el = document.createElement('div');
            el.innerText = i;
            if (i === now.getDate()) el.className = 'today';
            // 4월 29일 뚜기 생일 표시 (이번 달이 4월일 때만)
            if (now.getMonth() === 3 && i === 29) el.style.borderBottom = "2px solid black"; 
            daysContainer.appendChild(el);
        }

        // 30분마다 새로고침
        setTimeout(() => { location.reload(); }, 1800000);
    </script>
</body>
</html>
