<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium E-ink Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border: 2.2px;
            --radius: 28px;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* 날짜 헤더 - 하단 문구 삭제분만큼 위아래 패딩 추가 */
        .header {
            width: 100%;
            max-width: 500px;
            padding: 24px 4px; /* 위아래 패딩 강화 */
            text-align: left;
            box-sizing: border-box;
        }
        .header .date-full { 
            font-size: 2.2rem;
            font-weight: 900; 
            line-height: 1.2; 
            margin: 0; 
            letter-spacing: -1.5px; 
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .widget {
            border: var(--border) solid var(--fg);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            flex-direction: column;
            background: white;
            box-sizing: border-box;
        }

        .small { aspect-ratio: 1.1 / 1; justify-content: space-between; }
        .large-sq { grid-column: span 2; aspect-ratio: 1.2 / 1; justify-content: flex-start; }
        .medium { grid-column: span 2; min-height: 120px; justify-content: space-between; }

        .label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .value { font-size: 1.8rem; font-weight: 900; line-height: 1; margin: 2px 0; }
        .sub { font-size: 0.85rem; font-weight: 700; margin-top: 4px; }

        .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

        .routine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        
        /* 루틴 아이템 스타일 및 터치 효과 */
        .todo-item { 
            border: 2px solid var(--fg); 
            border-radius: 14px; 
            padding: 8px 10px; 
            font-size: 0.9rem; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        /* 체크 완료 시 스타일 (색상 반전) */
        .todo-item.done {
            background-color: var(--fg);
            color: var(--bg);
        }
        .todo-item.done .icon {
            stroke: var(--bg);
        }

        .cal-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day-label { font-size: 0.75rem; font-weight: 900; margin-bottom: 8px; opacity: 0.4; }
        .cal-date { font-size: 0.95rem; font-weight: 800; height: 32px; display: flex; align-items: center; justify-content: center; }
        .today { background: var(--fg); color: var(--bg); border-radius: 10px; font-weight: 900; }
        .birthday-mark { border-bottom: 3px solid var(--fg); font-weight: 900; }

        #quote-text {
            font-size: 0.9rem;
            font-weight: 800;
            line-height: 1.4;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="date-full" id="date-full">로딩 중...</h1>
    </div>

    <div class="container">
        <!-- 1. 날씨 위젯 -->
        <div class="widget small">
            <div class="label">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/><circle cx="12" cy="12" r="4"/></svg>
                Weather
            </div>
            <div class="value" id="weather-temp">--°</div>
            <div class="sub" id="weather-desc">데이터 호출 중</div>
        </div>

        <!-- 2. 정처기 D-Day -->
        <div class="widget small">
            <div class="label">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                Exam
            </div>
            <div class="value" id="exam-dday">D-?</div>
            <div class="sub">정보처리기사</div>
        </div>

        <!-- 3. 생일 -->
        <div class="widget small">
            <div class="label">
                <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"/></circle></svg>
                Birthday
            </div>
            <div class="value">04.29</div>
            <div class="sub">🎂 뚜기 생일</div>
        </div>

        <!-- 4. 명언 -->
        <div class="widget small">
            <div class="label">
                <svg class="icon" viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
                Quote
            </div>
            <div id="quote-text">로딩 중...</div>
        </div>

        <!-- 5. 모닝 루틴 (클릭/터치 가능) -->
        <div class="widget medium">
            <div class="label">
                <svg class="icon" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                Morning Routine
            </div>
            <div class="routine-grid" id="routine-list">
                <div class="todo-item" data-id="0"><svg class="icon" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>글씨연습</div>
                <div class="todo-item" data-id="1"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>영어공부</div>
                <div class="todo-item" data-id="2"><svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>시험공부</div>
                <div class="todo-item" data-id="3"><svg class="icon" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>커피내리기</div>
            </div>
        </div>

        <!-- 6. 캘린더 -->
        <div class="widget large-sq">
            <div class="label">
                <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                Calendar
            </div>
            <div class="cal-container">
                <div class="cal-grid" id="calendar"></div>
            </div>
        </div>
    </div>

    <script>
        const now = new Date();
        
        // 1. 날짜 업데이트
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const dayOfWeek = now.toLocaleDateString('ko-KR', { weekday: 'long' });
        document.getElementById('date-full').innerText = `${year}년 ${month}월 ${date}일 ${dayOfWeek}`;

        // 2. D-Day 계산
        const examDate = new Date(now.getFullYear(), 3, 18);
        const dDay = Math.ceil((examDate - now) / (1000 * 60 * 60 * 24));
        document.getElementById('exam-dday').innerText = dDay === 0 ? "D-Day" : `D-${dDay}`;

        // 3. 명언
        const quotes = [
            "오늘 할 수 있는 일에 전력을 다하라.",
            "천천히 가는 것을 두려워 말고, 중도에 그만두는 것을 두려워하라.",
            "성공은 매일 반복되는 작은 노력들의 합이다.",
            "가장 어두운 밤도 결국 끝날 것이며 해는 떠오를 것이다.",
            "미래를 예측하는 가장 좋은 방법은 미래를 창조하는 것이다.",
            "자신을 믿어라. 당신은 생각보다 더 강하다.",
            "기회는 준비된 자에게만 찾아온다.",
            "어제보다 나은 오늘을 만드는 데 집중하라.",
            "실패는 성공으로 가는 과정일 뿐이다.",
            "지금 이 순간이 당신의 인생을 결정한다."
        ];
        const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
        document.getElementById('quote-text').innerText = quotes[dayOfYear % quotes.length];

        // 4. 루틴 체크 기능 (로컬 저장소 연동)
        const routineItems = document.querySelectorAll('.todo-item');
        const todayKey = `routine-${year}-${month}-${date}`;
        
        // 저장된 상태 불러오기
        const savedState = JSON.parse(localStorage.getItem(todayKey) || "{}");
        
        routineItems.forEach(item => {
            const id = item.getAttribute('data-id');
            if (savedState[id]) item.classList.add('done');

            item.addEventListener('click', () => {
                const isDone = item.classList.toggle('done');
                savedState[id] = isDone;
                localStorage.setItem(todayKey, JSON.stringify(savedState));
            });
        });

        // 5. 실시간 날씨 데이터
        async function fetchWeather() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current_weather=true&timezone=Asia%2FSeoul');
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                document.getElementById('weather-temp').innerText = `${temp}°`;
                const weatherMap = { 0: "맑음", 1: "대체로 맑음", 2: "구름 조금", 3: "흐림", 45: "안개", 61: "비", 71: "눈", 95: "뇌우" };
                document.getElementById('weather-desc').innerText = `서울 · ${weatherMap[code] || "맑음"}`;
            } catch (e) {
                document.getElementById('weather-temp').innerText = "Err";
            }
        }
        fetchWeather();

        // 6. 캘린더 생성
        const calContainer = document.getElementById('calendar');
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const lastDate = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        
        dayNames.forEach(d => {
            const el = document.createElement('div');
            el.className = 'cal-date cal-day-label'; el.innerText = d;
            calContainer.appendChild(el);
        });

        for (let i = 0; i < firstDay; i++) calContainer.appendChild(document.createElement('div'));
        for (let i = 1; i <= lastDate; i++) {
            const el = document.createElement('div');
            el.className = 'cal-date'; el.innerText = i;
            if (i === now.getDate()) el.classList.add('today');
            if (now.getMonth() === 3 && i === 29) el.classList.add('birthday-mark');
            calContainer.appendChild(el);
        }

        // 30분마다 자동 새로고침 (데이터 갱신 및 잔상 제거)
        setTimeout(() => { location.reload(); }, 1800000);
    </script>
</body>
</html>
