<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My E-ink Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-width: 2px; /* E-ink에서는 선이 굵어야 잘 보여 */
            --radius: 24px; /* 맥 위젯의 핵심: 둥근 모서리 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 전체 대시보드 그리드 (2열 구성) */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px; /* 전자책 화면 폭에 맞춤 */
        }

        /* 공통 위젯 스타일 */
        .widget {
            border: var(--border-width) solid var(--text-color);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 스몰 위젯 (1x1) */
        .small { aspect-ratio: 1 / 1; }

        /* 미디엄 위젯 (2x1) */
        .medium { grid-column: span 2; min-height: 120px; }

        /* 텍스트 스타일링 */
        .label { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; opacity: 0.8; }
        .value { font-size: 2.2rem; font-weight: 900; margin: 0; line-height: 1.1; }
        .sub-text { font-size: 1rem; margin-top: 10px; font-weight: 500; }

        /* 리스트 스타일 (독서 목록용) */
        ul { list-style: none; padding: 0; margin: 10px 0 0 0; }
        li { font-size: 1.1rem; margin-bottom: 8px; font-weight: 600; }
        li::before { content: "○ "; } /* 체크박스 대용 */

        /* 시간/날씨 강조 */
        .big-time { font-size: 3rem; letter-spacing: -2px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="widget small">
            <div>
                <div class="label">영등포구</div>
                <div class="value">17°</div>
            </div>
            <div class="sub-text">맑음 ↓11° ↑19°</div>
        </div>

        <div class="widget small">
            <div>
                <div class="label">Reading</div>
                <div class="value">45%</div>
            </div>
            <div class="sub-text">세이노의 가르침</div>
        </div>

        <div class="widget medium">
            <div class="label">이번 주 완독 목표</div>
            <ul>
                <li>타이탄의 도구들</li>
                <li>도파민 네이션 (읽는 중)</li>
                <li>역행자</li>
            </ul>
        </div>

        <div class="widget medium" style="justify-content: center; text-align: center;">
            <p style="font-size: 1.2rem; font-weight: 700; font-style: italic;">
                "읽지 않는 책은 종이 뭉치일 뿐이다."
            </p>
        </div>
    </div>

    <script>
        setTimeout(() => { location.reload(); }, 1800000);
    </script>
</body>
</html>
